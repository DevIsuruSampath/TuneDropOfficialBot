services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/etc/traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tunedropofficialbot_web"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

  tunedrop:
    build: .
    container_name: tunedrop
    restart: unless-stopped
    networks:
      - web
    env_file:
      - .env
    volumes:
      - session_data:/app/data
      - downloads:/app/downloads
      - logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tunedrop-http.rule=Host(`${TUNEDROP_DOMAIN}`)"
      - "traefik.http.routers.tunedrop-http.entrypoints=web"
      - "traefik.http.routers.tunedrop-http.middlewares=tunedrop-https-redirect"
      - "traefik.http.middlewares.tunedrop-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.tunedrop.rule=Host(`${TUNEDROP_DOMAIN}`)"
      - "traefik.http.routers.tunedrop.entrypoints=websecure"
      - "traefik.http.routers.tunedrop.tls.certresolver=letsencrypt"
      - "traefik.http.services.tunedrop.loadbalancer.server.port=8080"

networks:
  web:

volumes:
  traefik_data:
  session_data:
  downloads:
  logs:
