<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download {{ file_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <p class="eyebrow">Telegram Music Downloader</p>
    <h1>{{ file_name }}</h1>
    <p class="meta">File size: {{ size_text }}</p>
    <p class="meta">Estimated time at {{ speed_kbps }} KB/s: {{ estimated_time }}</p>
    <a class="button" href="{{ direct_link }}">Download ZIP</a>
  </main>
</body>
</html>
